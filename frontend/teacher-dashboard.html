<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard — Campus Connect</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <!-- Top Bar -->
    <div class="top-bar">
        <div class="top-bar-left">
            <button class="menu-btn"><svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
            <div class="top-bar-title">Unified B.Tech Academic Suite</div>
        </div>
        <div class="top-bar-center">
            <div class="prompt-input-wrapper">
                <svg viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" stroke-width="2" width="18" height="18"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" placeholder="Ask Campus Connect anything...">
                <span class="shortcut-key">⌘K</span>
            </div>
        </div>
    </div>

    <div class="app-container">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="main-content">
            <div class="page-header">
                <h1 id="welcomeTitle">Teacher Dashboard</h1>
                <p>Manage your classes, attendance, and grades</p>
            </div>

            <!-- Stats -->
            <div class="stats-grid" id="statsGrid"></div>

            <!-- My Classes -->
            <div class="card fade-in-up delay-2 mb-24">
                <div class="card-header"><h3>🏫 My Classes</h3></div>
                <div id="classesList"><p style="color:var(--text-muted)">Loading...</p></div>
            </div>

            <!-- Charts -->
            <div class="grid-2">
                <div class="card fade-in-up delay-3">
                    <div class="card-header"><h3>📊 Student Performance</h3></div>
                    <div class="chart-container"><canvas id="perfChart"></canvas></div>
                </div>
                <div class="card fade-in-up delay-3">
                    <div class="card-header"><h3>📈 Status Distribution</h3></div>
                    <div class="chart-container"><canvas id="statusChart"></canvas></div>
                </div>
            </div>

            <!-- Mark Attendance -->
            <div class="card fade-in-up delay-4 mt-24">
                <div class="card-header">
                    <h3>✅ Mark Attendance</h3>
                    <div style="display:flex;gap:12px;align-items:center">
                        <select class="form-control" id="attClassSelect" style="width:auto">
                            <option value="">Select Class</option>
                        </select>
                        <input type="date" class="form-control" id="attDate" style="width:auto">
                        <button class="btn btn-primary btn-sm" onclick="saveAttendance()">Save</button>
                    </div>
                </div>
                <div id="attendanceForm"><p style="color:var(--text-muted)">Select a class to mark attendance</p></div>
            </div>

            <!-- Add Marks -->
            <div class="card fade-in-up delay-4 mt-24">
                <div class="card-header"><h3>📝 Add Marks</h3></div>
                <form id="marksForm" style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto;gap:12px;align-items:end">
                    <div class="form-group" style="margin:0">
                        <label>Student</label>
                        <select class="form-control" id="markStudent" required><option value="">Select</option></select>
                    </div>
                    <div class="form-group" style="margin:0">
                        <label>Subject</label>
                        <select class="form-control" id="markSubject" required><option value="">Select</option></select>
                    </div>
                    <div class="form-group" style="margin:0">
                        <label>Score (0-100)</label>
                        <input type="number" class="form-control" id="markScore" min="0" max="100" required>
                    </div>
                    <div class="form-group" style="margin:0">
                        <label>Exam Type</label>
                        <select class="form-control" id="markType">
                            <option>Midterm</option><option>Final</option><option>Quiz</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary btn-sm">Add</button>
                </form>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script>
        const user = requireAuth(['teacher', 'admin']);
        if (!user) throw new Error('Not authorized');
        const role = user.role;
        const tid = user.teacher_id;

        document.getElementById('sidebar').innerHTML = buildSidebar(role, 'teacher-dashboard');
        document.getElementById('welcomeTitle').textContent = `Welcome, ${user.name || user.username}`;
        document.getElementById('attDate').value = getTodayStr();
        getChartDefaults();

        let allStudents = [], allSubjects = [], myClasses = [];

        (async () => {
            // Load classes
            if (tid) {
                const tcRes = await apiGet(`/api/teachers/${tid}/classes`);
                myClasses = tcRes.classes;
            } else {
                const cRes = await apiGet('/api/classes');
                myClasses = cRes.classes;
            }

            // Stats
            const statsRes = await apiGet('/api/analytics/dashboard-stats');
            const st = statsRes.stats;
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card cyan fade-in-up delay-1">
                    <div class="stat-icon">🏫</div>
                    <div class="stat-value">${myClasses.length}</div>
                    <div class="stat-label">My Classes</div>
                </div>
                <div class="stat-card blue fade-in-up delay-2">
                    <div class="stat-icon">👩‍🎓</div>
                    <div class="stat-value">${st.totalStudents}</div>
                    <div class="stat-label">Total Students</div>
                </div>
                <div class="stat-card green fade-in-up delay-3">
                    <div class="stat-icon">📈</div>
                    <div class="stat-value">${st.classAverage || 0}</div>
                    <div class="stat-label">Class Average</div>
                </div>
                <div class="stat-card red fade-in-up delay-4">
                    <div class="stat-icon">📅</div>
                    <div class="stat-value">${st.overallAttendance || 0}%</div>
                    <div class="stat-label">Attendance Rate</div>
                </div>
            `;

            // My Classes cards
            if (myClasses.length) {
                document.getElementById('classesList').innerHTML = `
                    <div class="stats-grid">${myClasses.map(c => `
                        <div class="stat-card blue" style="cursor:default">
                            <div style="font-size:18px;font-weight:700;color:var(--text-primary);margin-bottom:8px">${c.name || c.class_name}</div>
                            <div style="font-size:13px;color:var(--text-muted)">Grade ${c.grade} · Section ${c.section}</div>
                            <div style="font-size:13px;color:var(--text-muted)">Room: ${c.room_number || 'N/A'}</div>
                        </div>
                    `).join('')}</div>`;
            }

            // Populate attendance class select
            const attSelect = document.getElementById('attClassSelect');
            myClasses.forEach(c => {
                const cid = c.id || c.class_id;
                const cname = c.name || c.class_name;
                attSelect.innerHTML += `<option value="${cid}">${cname}</option>`;
            });
            attSelect.addEventListener('change', loadAttendanceForm);

            // Student performance chart
            const summaryRes = await apiGet('/api/analytics/summary');
            const students = summaryRes.data;
            allStudents = students;

            if (students.length) {
                new Chart(document.getElementById('perfChart'), {
                    type: 'bar',
                    data: {
                        labels: students.map(s => s.name),
                        datasets: [{
                            label: 'Average Score',
                            data: students.map(s => s.avg_score),
                            backgroundColor: students.map((_, i) => colorList[i % colorList.length].bg),
                            borderColor: students.map((_, i) => colorList[i % colorList.length].border),
                            borderWidth: 2,
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: { y: { beginAtZero: true, max: 100 } }
                    }
                });
            }

            // Status distribution chart
            const statusCounts = {};
            students.forEach(s => {
                statusCounts[s.performance_status] = (statusCounts[s.performance_status] || 0) + 1;
            });
            const statusLabels = Object.keys(statusCounts);
            const statusColors = {
                'Excellent': '#10b981', 'Good': '#3b82f6', 'Average': '#f59e0b',
                'At Risk': '#ef4444', 'Failing': '#dc2626'
            };

            new Chart(document.getElementById('statusChart'), {
                type: 'doughnut',
                data: {
                    labels: statusLabels,
                    datasets: [{
                        data: statusLabels.map(l => statusCounts[l]),
                        backgroundColor: statusLabels.map(l => statusColors[l] || '#94a3b8'),
                        borderWidth: 0, hoverOffset: 8,
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false,
                    cutout: '65%', plugins: { legend: { position: 'bottom' } }
                }
            });

            // Populate marks form selects
            const markStudentSel = document.getElementById('markStudent');
            students.forEach(s => {
                markStudentSel.innerHTML += `<option value="${s.student_id}">${s.name} (${s.class_name})</option>`;
            });
            const subRes = await apiGet('/api/subjects');
            allSubjects = subRes.subjects;
            const markSubjectSel = document.getElementById('markSubject');
            allSubjects.forEach(s => {
                markSubjectSel.innerHTML += `<option value="${s.id}">${s.name} (${s.class_name})</option>`;
            });
        })();

        // Attendance form
        async function loadAttendanceForm() {
            const classId = document.getElementById('attClassSelect').value;
            if (!classId) {
                document.getElementById('attendanceForm').innerHTML = '<p style="color:var(--text-muted)">Select a class</p>';
                return;
            }
            const studRes = await apiGet(`/api/classes/${classId}/students`);
            if (!studRes.students.length) {
                document.getElementById('attendanceForm').innerHTML = '<p style="color:var(--text-muted)">No students in this class</p>';
                return;
            }
            document.getElementById('attendanceForm').innerHTML = `
                <table class="data-table">
                    <thead><tr><th>Roll</th><th>Name</th><th>Status</th></tr></thead>
                    <tbody>${studRes.students.map(s => `
                        <tr>
                            <td>${s.roll_number}</td>
                            <td>${s.name}</td>
                            <td>
                                <select class="form-control att-status" data-sid="${s.id}" style="width:auto;padding:6px 12px">
                                    <option value="Present">Present</option>
                                    <option value="Absent">Absent</option>
                                    <option value="Late">Late</option>
                                </select>
                            </td>
                        </tr>
                    `).join('')}</tbody>
                </table>`;
        }

        async function saveAttendance() {
            const classId = document.getElementById('attClassSelect').value;
            const date = document.getElementById('attDate').value;
            if (!classId || !date) return showToast('Select class and date', 'error');

            const records = [];
            document.querySelectorAll('.att-status').forEach(sel => {
                records.push({ student_id: parseInt(sel.dataset.sid), status: sel.value });
            });
            if (!records.length) return showToast('No students to mark', 'error');

            try {
                await apiPost('/api/attendance/bulk', { class_id: parseInt(classId), date, records });
                showToast('Attendance saved successfully!');
                setTimeout(() => location.reload(), 1500);
            } catch (err) {
                showToast(err.message || 'Failed to save', 'error');
            }
        }

        // Add marks form
        document.getElementById('marksForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await apiPost('/api/marks', {
                    student_id: parseInt(document.getElementById('markStudent').value),
                    subject_id: parseInt(document.getElementById('markSubject').value),
                    score: parseInt(document.getElementById('markScore').value),
                    exam_type: document.getElementById('markType').value,
                });
                showToast('Marks added successfully!');
                document.getElementById('markScore').value = '';
                setTimeout(() => location.reload(), 1500);
            } catch (err) {
                showToast(err.message || 'Failed to add marks', 'error');
            }
        });
    </script>
</body>
</html>
